# Default values for b2bua-worker.

replicaCount: 3

image:
  repository: sipjsserver
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion if empty.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# SIP UDP port the worker binds inside the pod. The sip-front-proxy
# chart's `worker.podPort` MUST match this.
sipPort: 5060

# Admin/HTTP port the worker exposes for status. Used by the sidecar
# liveness / readiness TCP socket probes since K8s doesn't natively
# support UDP probes (Phase 2 may replace with a real HTTP health
# endpoint backed by `DrainingState.mode`).
#
# The worker's StatusServer also serves the `/replog` long-poll
# replication endpoint on this same port — peer workers reach it via
# the headless StatefulSet DNS (`<pod>.<svc>.<ns>:adminPort/replog`).
adminPort: 3002

# RFC 3261 Timer C (180s) + 20s safety. The worker's
# `DrainingState.Default` SIGTERM handler flips OPTIONS replies to 503
# immediately on receipt of SIGTERM; the proxy observes the
# deletion-timestamp accelerant in the K8s view as well. The worker
# keeps serving in-flight calls (ACK / CANCEL especially) for the
# entire grace window before K8s SIGKILLs.
terminationGracePeriodSeconds: 200

resources: {}

# Liveness/readiness: K8s does not support UDP probes. We use a TCP
# socket probe against the admin port as a coarse "process alive"
# signal. Real OPTIONS-driven readiness comes from the proxy's own
# HealthProbe; the K8s probe just gates the pod for restart on hard
# crash.
livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

# Headless Service for stable per-pod DNS (StatefulSet pattern). The
# proxy resolves pods by name+IP from its watch, but the headless
# Service is required so pod DNS records exist (`<pod>.<svc>.<ns>`).
service:
  clusterIP: None
  annotations: {}

# Storage for CDR / persistence. Set to non-empty to enable a PVC.
persistence:
  enabled: false
  storageClass: ""
  size: 1Gi
  mountPath: /data

extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}

# StatefulSet-specific.
podManagementPolicy: OrderedReady
updateStrategy:
  type: RollingUpdate

# Per-pod Redis sidecar — colocated with each worker, in-memory only,
# unshared. Each worker writes only to its own sidecar at
# `localhost:6379` (set REDIS_URL accordingly via extraEnv); peer
# workers fetch state via the worker's `/replog` long-poll endpoint
# (served on adminPort by the same Node process). See
# docs/replication/call-cache-backup.md §2-§4.
#
# Disabled by default so the production chart remains backward
# compatible with deployments that supply their own (potentially
# shared, potentially clustered) Redis. Tests / dual-write deployments
# enable it.
redis:
  enabled: false
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  # Lightweight per spec: in-memory only, no AOF, no RDB. The sidecar
  # holds at most one worker's call set; tens of MiB peak.
  resources:
    requests:
      memory: 50Mi
      cpu: 25m
    limits:
      memory: 256Mi
  # Backing storage is emptyDir so the sidecar restarts with a clean
  # state when the pod is replaced — matches the design assumption in
  # call-cache-backup.md §11.2 (sidecar-wiped recovery path).
  emptyDir:
    sizeLimit: 256Mi
  # Disable persistence and snapshotting explicitly. Sidecars are
  # ephemeral by design; redis-server defaults to RDB snapshots on
  # SIGTERM, which we don't want.
  args:
    - "--save"
    - ""
    - "--appendonly"
    - "no"
    - "--maxmemory-policy"
    - "noeviction"
