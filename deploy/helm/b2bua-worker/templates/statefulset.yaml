apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "b2bua-worker.fullname" . }}
  labels:
    {{- include "b2bua-worker.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "b2bua-worker.fullname" . }}  # Headless Service.
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "b2bua-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "b2bua-worker.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # The worker's `DrainingState.Default` SIGTERM handler flips
      # OPTIONS replies to 503 immediately on receipt of SIGTERM and
      # the proxy's K8s watch sees the deletion-timestamp accelerant.
      # No `preStop` hook needed — both signals fire in parallel and
      # the worker keeps serving in-flight calls (especially ACK /
      # CANCEL) for the entire grace window.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Default CMD in the image (`node dist/main.js`) — explicit
          # here for clarity and to make per-pod overrides easy.
          command: ["node", "dist/main.js"]
          ports:
            - name: sip-udp
              containerPort: {{ .Values.sipPort }}
              protocol: UDP
            # `admin` exposes the StatusServer port — `/metrics`,
            # `/call-control`, and `/replog` are all routes on this
            # same HTTP server. Peer workers reach the replog stream
            # via the headless StatefulSet DNS
            # (`<pod>.<svc>.<ns>.svc.cluster.local:<adminPort>/replog`).
            - name: admin
              containerPort: {{ .Values.adminPort }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Namespace from the downward API. Required by the
            # data-replication consumer wiring (ReadyGate +
            # ReplPuller per-peer fibers — Phase 0b). When absent
            # (single-node / non-K8s deployments) the worker skips
            # the boot handshake gracefully and only serves the
            # `/replog` producer side.
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Headless StatefulSet service name peer workers resolve
            # through. Defaults to `b2bua-worker` to match the chart's
            # fullname template; override via values.yaml if the
            # release name differs.
            - name: WORKER_SERVICE_NAME
              value: {{ include "b2bua-worker.fullname" . | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.preStopSleepSec }}
          # preStop sleep keeps the container in `Terminating` for the
          # configured window before the kubelet SIGTERMs the worker
          # process. Critical for the failover-suite tests: SIPs's BYE
          # only flows ~15s after the kill (per uac-hold-failover.xml's
          # ACK→BYE pause), and without this sleep the worker process
          # exits on SIGTERM in <2s, the StatefulSet replaces the pod
          # with a fresh primary, and BYEs that should `tryBackup` end
          # up `decode_forward`'d to the empty replacement → 481.
          # Set to 0 in production values.yaml; the failover values
          # override sets it to span the full BYE window.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", {{ . | quote }}]
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          # K8s does not support UDP probes — TCP socket on the admin
          # port is the standard dodge. This only catches hard-crash;
          # SIP-level "drained but alive" is observed by the proxy's
          # own OPTIONS keepalive HealthProbe (D5).
          livenessProbe:
            tcpSocket:
              port: admin
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          # Slice D9 — replication-aware readiness gate.
          #
          # `/ready` returns 200 only when the worker is past its
          # boot-time ReadyGate handshake (data-replication drain
          # complete) AND not currently draining (SIGTERM received).
          # Either signal alone keeps the pod out of K8s Service
          # Endpoints, which transitively keeps the proxy from
          # routing in-dialog traffic to a worker that hasn't
          # rehydrated its `pri:` partition from peers' `bak:`
          # snapshots — see docs/replication/call-cache-backup.md
          # §8 (ReadyGate spec).
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.redis.enabled }}
        # Per-pod Redis sidecar for the data-replication layer
        # (docs/replication/call-cache-backup.md §2-§4). The worker
        # writes call/idx/propagate data here on `localhost:6379`;
        # peer workers reach this sidecar's contents via the worker's
        # `/replog` long-poll endpoint, never via direct Redis TCP.
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          args:
            {{- toYaml .Values.redis.args | nindent 12 }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # Bind to the loopback so only the worker container in the
          # same pod can reach it. Backed by emptyDir — see §11.2.
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
        {{- end }}
      {{- if .Values.redis.enabled }}
      volumes:
        - name: redis-data
          emptyDir:
            sizeLimit: {{ .Values.redis.emptyDir.sizeLimit }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
