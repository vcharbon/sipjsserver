# Default values for sip-front-proxy.

replicaCount: 2

image:
  repository: sipjsserver
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion if empty.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# K8s registry watch target — the B2BUA-worker StatefulSet to load-balance.
worker:
  namespace: ""              # Defaults to .Release.Namespace.
  statefulSetName: b2bua-worker
  podPort: 5060
  labelSelector: ""          # Optional override; defaults to
                             # `app.kubernetes.io/name=<statefulSetName>`.

# UDP bind for the proxy itself. When vip.enabled, the chart overrides
# bind.host with vip.address so the listener binds to the VIP — making
# outbound forwarded SIP automatically source-IP'd as the VIP (kernel
# uses bound IP as source). Worker replies land on whoever currently
# owns the VIP, which is the live master post-failover. See
# docs/lb-proxy-ha.md "Source-IP discipline".
bind:
  host: "0.0.0.0"
  port: 5060
  advertisedHost: ""         # Defaults to vip.address when vip.enabled,
                             # else to the Service ClusterIP.
  advertisedPort: 0          # 0 → use bind.port.

# OPTIONS keepalive probe — auxiliary UDP socket the proxy uses to ping
# workers and overlay probe-side health on the K8s view.
healthProbe:
  bindHost: "0.0.0.0"
  bindPort: 5061
  intervalMs: 1000
  timeoutMs: 1500
  threshold: 2

# HMAC key for the routing-cookie signature. Operator provides one of:
#   --set hmacKey=<base64-bytes>            (will be base64-decoded by Helm)
#   --set-file hmacKey=path/to/key.bin
# When `previousHmacKey` is set the proxy verifies cookies signed by EITHER
# key during the NFR-8 1h overlap window.
hmacKey: ""
previousHmacKey: ""

service:
  type: ClusterIP
  # Annotations for upstream LBs / IPVS / consistent-hash topologies (D6).
  annotations: {}

# Shared VIP managed by a keepalived sidecar — see docs/lb-proxy-ha.md.
# When enabled, both proxy pods participate in a VRRP instance, the
# active pod answers ARP for vip.address, and clients reach the LB at
# that single stable IP. Required: hostNetwork pod, NET_ADMIN/NET_RAW
# caps on the sidecar, anti-affinity to keep the two pods on separate
# nodes. Cloud deployments skip this block and substitute a cloud LB
# without changing the proxy code.
vip:
  enabled: false
  address: ""               # Required when enabled. Static IP in the
                            # node subnet, kept off any DHCP pool.
  interface: ""             # VRRP interface; auto-detect when empty.
  routerId: 51              # virtual_router_id, must be unique on the
                            # L2 segment across all VRRP groups.
  advertIntSec: "0.5"       # 500 ms VRRP advertisement interval.
                            # Hold-down = 3 × advertIntSec.
  unicastPeers: []          # When the L2 segment drops VRRP multicast,
                            # list peer IPs here for unicast VRRP.
  keepalivedImage:
    repository: osixia/keepalived
    tag: "2.0.20"
    pullPolicy: IfNotPresent

resources: {}

# RFC 3261 Timer C max INVITE establishment is 180s; +20s safety = 200s
# (see resilience-model.md timing table).
terminationGracePeriodSeconds: 200

nodeSelector: {}
tolerations: []
affinity: {}

# Extra env vars injected verbatim into the proxy pod.
extraEnv: []

# RBAC: the proxy needs `get,list,watch` on `pods` in its namespace to
# drive `WorkerRegistry.kubernetesStatefulSet`.
rbac:
  create: true

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
