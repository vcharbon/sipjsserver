{{- if .Values.vip.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sip-front-proxy.fullname" . }}-keepalived
  labels:
    {{- include "sip-front-proxy.labels" . | nindent 4 }}
data:
  keepalived.conf: |
    # Generated by Helm — see docs/lb-proxy-ha.md.
    # Identical config on both pods. With state BACKUP + nopreempt the
    # first pod to come up wins the VIP and keeps it across peer reboots,
    # avoiding flapping.

    global_defs {
        router_id sip-front-proxy
        enable_script_security
        script_user root
    }

    # NOTE: a vrrp_script chk_proxy block was originally here to drop
    # effective priority when the proxy process is gone. Removed for
    # now — keepalived returned exit-127 even though the script worked
    # when run manually (script-runner quirk to investigate). Pure VRRP
    # peer-silence still catches process crash via SIGCHLD-driven pod
    # exit + 1.5s hold-down. Re-add when the runner quirk is resolved.

    vrrp_instance VI_SIP {
        state BACKUP
        {{- if .Values.vip.interface }}
        interface {{ .Values.vip.interface | quote }}
        {{- else }}
        # Auto-detect the interface that owns the default route. Override
        # via vip.interface if needed.
        interface eth0
        {{- end }}
        virtual_router_id {{ .Values.vip.routerId }}
        priority 100
        advert_int {{ .Values.vip.advertIntSec }}
        nopreempt

        {{- if .Values.vip.unicastPeers }}
        unicast_peer {
            {{- range .Values.vip.unicastPeers }}
            {{ . }}
            {{- end }}
        }
        {{- end }}

        virtual_ipaddress {
            {{ .Values.vip.address }}
        }

        # Bind the VIP on lo at all times so either pod can use it as the
        # outbound source IP for forwarded SIP — see docs/lb-proxy-ha.md
        # "Source-IP discipline".
        notify_master "/bin/sh -c 'ip addr add {{ .Values.vip.address }}/32 dev lo 2>/dev/null || true'"
        notify_backup "/bin/sh -c 'ip addr add {{ .Values.vip.address }}/32 dev lo 2>/dev/null || true'"
        notify_fault  "/bin/sh -c 'ip addr add {{ .Values.vip.address }}/32 dev lo 2>/dev/null || true'"
    }
{{- end }}
