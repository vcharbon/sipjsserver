apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sip-front-proxy.fullname" . }}
  labels:
    {{- include "sip-front-proxy.labels" . | nindent 4 }}
data:
  PROXY_REGISTRY_MODE: "kubernetes"
  PROXY_BIND_HOST: {{ .Values.bind.host | quote }}
  PROXY_BIND_PORT: {{ .Values.bind.port | quote }}
  {{- if .Values.bind.advertisedHost }}
  PROXY_ADVERTISED_HOST: {{ .Values.bind.advertisedHost | quote }}
  {{- end }}
  {{- if and .Values.bind.advertisedPort (gt (int .Values.bind.advertisedPort) 0) }}
  PROXY_ADVERTISED_PORT: {{ .Values.bind.advertisedPort | quote }}
  {{- end }}
  PROXY_K8S_NAMESPACE: {{ include "sip-front-proxy.workerNamespace" . | quote }}
  PROXY_K8S_STATEFULSET_NAME: {{ .Values.worker.statefulSetName | quote }}
  PROXY_K8S_POD_PORT: {{ .Values.worker.podPort | quote }}
  {{- if .Values.worker.labelSelector }}
  PROXY_K8S_LABEL_SELECTOR: {{ .Values.worker.labelSelector | quote }}
  {{- end }}
  PROXY_HEALTH_PROBE_BIND_HOST: {{ .Values.healthProbe.bindHost | quote }}
  PROXY_HEALTH_PROBE_BIND_PORT: {{ .Values.healthProbe.bindPort | quote }}
  PROXY_HEALTH_PROBE_INTERVAL_MS: {{ .Values.healthProbe.intervalMs | quote }}
  PROXY_HEALTH_PROBE_TIMEOUT_MS: {{ .Values.healthProbe.timeoutMs | quote }}
  PROXY_HEALTH_PROBE_THRESHOLD: {{ .Values.healthProbe.threshold | quote }}
