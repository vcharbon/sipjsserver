# Test-only overrides for the sip-front-proxy production chart.
# Production chart: deploy/helm/sip-front-proxy/

# Match what we built + loaded into kind via tests/k8s/scripts/images.ts.
image:
  repository: sipjsserver
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

# Pin proxy pods to the edge tier nodes (kind worker labels in cluster.yaml).
nodeSelector:
  tier: edge

# vip.enabled below promotes anti-affinity to required + adds the
# anti-affinity term itself; no explicit affinity block needed.
affinity: {}

# Shared VIP via keepalived — see docs/lb-proxy-ha.md. The address is
# picked from the kind docker bridge subnet (172.20.0.0/16, verified
# via `docker network inspect kind`); high-bound static IP avoids
# collision with kind's node IPs which are assigned low.
vip:
  enabled: true
  address: "172.20.255.250"
  routerId: 51
  advertIntSec: "0.5"

# Worker discovery: proxy watches the b2bua-worker StatefulSet in the
# same namespace. The worker chart sets fullnameOverride so this name is
# stable across installs.
worker:
  statefulSetName: b2bua-worker
  podPort: 5060

# Advertised address stamped onto Record-Route URIs. With vip.enabled
# the chart defaults this to vip.address — the stable VIP — so in-dialog
# requests from sipp Job pods land on whichever proxy currently owns the
# VIP. Leaving advertisedHost empty here lets the chart resolution apply.
#
# The hybrid host-side harness (tests/support/registrarFrontProxy-
# HybridStack.ts) needs its own install with overrides since the VIP is
# only reachable from inside the kind docker network.
bind:
  host: "0.0.0.0"
  port: 5060
  advertisedPort: 5060

# Keepalive cadence — keep the production defaults so we exercise the
# real timing.
healthProbe:
  bindHost: "0.0.0.0"
  bindPort: 5061
  intervalMs: 2000
  timeoutMs: 1500
  threshold: 3

# 32-byte ASCII test keys (test-only — do NOT use in production).
# Helm's secret template `b64enc`s these into the K8s Secret, which
# K8s then decodes back to the raw bytes on the file mount.
hmacKey: "phaseA-test-hmac-CURRENT-PAD1234"
previousHmacKey: "phaseA-test-hmac-PREVIOUS-PAD123"

# NodePort 30060 matches tests/k8s/cluster.yaml's extraPortMappings on
# the load-tier worker (containerPort 30060 → hostPort 5060/UDP). The
# hybrid register-fakeExt-realCore harness sends UDP from the host
# loopback and traffic reaches the in-cluster proxy via this NodePort.
# (The hybrid harness runs its own in-process register-proxy on the
# host and treats the in-cluster sip-front-proxy + b2bua-worker stack
# as an opaque "core" peer; REGISTERs are terminated in-process and
# never reach the cluster, so PROXY_REGISTER_MODE here is irrelevant.)
service:
  type: NodePort
  nodePort: 30060
