# Test-only overrides for the sip-front-proxy production chart.
# Production chart: deploy/helm/sip-front-proxy/

# Match what we built + loaded into kind via tests/k8s/scripts/images.ts.
image:
  repository: sipjsserver
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

# Pin proxy pods to the edge tier nodes (kind worker labels in cluster.yaml).
nodeSelector:
  tier: edge

# Prefer one proxy pod per edge node, but allow rolling updates (where
# transiently both old + new pods need to coexist). Production uses
# `required` for true HA placement.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sip-front-proxy
          topologyKey: kubernetes.io/hostname

# Worker discovery: proxy watches the b2bua-worker StatefulSet in the
# same namespace. The worker chart sets fullnameOverride so this name is
# stable across installs.
worker:
  statefulSetName: b2bua-worker
  podPort: 5060

# Advertised address stamped onto Record-Route URIs. The in-cluster
# sipp UAC (Job pods) populates its dialog route set from this URI and
# uses it for ALL in-dialog requests (ACK, BYE, re-INVITE, UPDATE,
# INFO, …). It must therefore resolve from inside the cluster.
#
# Using the headless Service DNS name `sip-front-proxy` (UDP/5060) lets
# kube-proxy load-balance the in-dialog request to either proxy pod;
# both pods share the HMAC keys so any pod can decode the stickiness
# cookie and forward to the call's primary or backup worker.
#
# NOTE: the host-side hybrid harness (tests/support/registrarFront-
# ProxyHybridStack.ts) historically relied on advertisedHost being
# `127.0.0.1` so its host-resident UAC could send in-dialog requests
# back through the kind hostPort. That harness now needs its own
# install with a values override; the in-cluster failover/drain suite
# is the primary user of this chart.
bind:
  host: "0.0.0.0"
  port: 5060
  advertisedHost: "sip-front-proxy"
  advertisedPort: 5060

# Keepalive cadence — keep the production defaults so we exercise the
# real timing.
healthProbe:
  bindHost: "0.0.0.0"
  bindPort: 5061
  intervalMs: 2000
  timeoutMs: 1500
  threshold: 3

# 32-byte ASCII test keys (test-only — do NOT use in production).
# Helm's secret template `b64enc`s these into the K8s Secret, which
# K8s then decodes back to the raw bytes on the file mount.
hmacKey: "phaseA-test-hmac-CURRENT-PAD1234"
previousHmacKey: "phaseA-test-hmac-PREVIOUS-PAD123"

# NodePort 30060 matches tests/k8s/cluster.yaml's extraPortMappings on
# the load-tier worker (containerPort 30060 → hostPort 5060/UDP). The
# hybrid register-fakeExt-realCore harness sends UDP from the host
# loopback and traffic reaches the in-cluster proxy via this NodePort.
# (The hybrid harness runs its own in-process register-proxy on the
# host and treats the in-cluster sip-front-proxy + b2bua-worker stack
# as an opaque "core" peer; REGISTERs are terminated in-process and
# never reach the cluster, so PROXY_REGISTER_MODE here is irrelevant.)
service:
  type: NodePort
  nodePort: 30060
