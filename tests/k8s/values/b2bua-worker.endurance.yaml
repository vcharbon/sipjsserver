# Endurance-only overlay layered on top of
# `tests/k8s/values/b2bua-worker.yaml`.
#
# `run-endurance.ts` applies both files when installing the
# b2bua-worker chart. The base file stays neutral so the memleak
# harness (`sippperftest/memleak-test-k8s.sh`, which has its own
# overlay `sippperftest/values-memleak-worker.yaml`) is not affected.
#
# Why this overlay exists: run
# `endurance-2026-05-09t20-26-22-853z` showed workers freezing
# ~15 min after pod start with no diagnostic data captured. The heap
# was 1.2 GB with `concurrent=0` calls, and the only signal was a
# proxy probe-miss → declared dead. Without the flags below the next
# endurance run reproduces the same opaque collapse.
#
# The memleak overlay deliberately fully replaces `extraEnv` (chart
# helpers do shallow array merge — we don't fight that). This file
# follows the same convention: it appends to extraEnv by repeating
# the upstream entries plus the diagnostic NODE_OPTIONS.

extraEnv:
  - name: REDIS_URL
    value: "redis://localhost:6379"
  - name: LIMITER_REDIS_URL
    value: "redis://redis:6379"
  - name: SIP_LOCAL_IP
    value: "$(POD_IP)"
  - name: CALL_CONTROL_URL
    value: "http://call-control:8080"
  - name: B2B_OUTBOUND_PROXY
    value: "172.20.255.250:5060"
  # Endurance leak diagnostics:
  # - `--heapsnapshot-signal=SIGUSR2` lets `kill -USR2 1` (or the
  #   orchestrator) trigger a v8 heap snapshot to the worker's CWD.
  #   `/debug/heap-snapshot` HTTP endpoint already works without this
  #   flag; the signal route is the fallback when the event loop is
  #   stuck and HTTP routing is unresponsive.
  # - `--max-old-space-size=400` keeps V8's old space below the
  #   container `resources.limits.memory` cap (512Mi). When the leak
  #   crosses 400Mi the JS layer triggers a heap-OOM with a stack
  #   trace, before the kernel OOMKill removes the pod silently.
  # - `--heapsnapshot-near-heap-limit=2` auto-dumps two heap snapshots
  #   the first two times the heap approaches the V8 limit, so even
  #   an unattended run captures the leaking heap before crash. Files
  #   land in the container's CWD — with `heapdumps.enabled` below,
  #   that's `/heapdumps` (an emptyDir that survives container
  #   restart) instead of `/app` (writable layer, lost on OOM-kill).
  - name: NODE_OPTIONS
    value: "--heapsnapshot-signal=SIGUSR2 --max-old-space-size=400 --heapsnapshot-near-heap-limit=2"

# Cap worker app container memory so unreclaimable heap growth
# becomes a deterministic OOMKilled at 1Gi instead of slow CPU
# saturation at 1.2 GB+ (the post-run idle state observed in
# endurance-2026-05-09t20-26-22-853z). The production helm values
# leave `resources: {}` — this cap is test-environment only.
#
# 1Gi vs --max-old-space-size=400: leaves ~624Mi of headroom above
# V8's old-space cap. This is sized to let v8.writeHeapSnapshot
# actually flush a complete snapshot before the cgroup OOM-killer
# fires. Run oom-investigation-50pct-20260510-223300 proved a 512Mi
# cap is too tight: the snapshot writer's transient allocations
# pushed RSS past 512Mi within seconds and left 0-byte files.
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 25m
    memory: 100Mi

# Mount /heapdumps emptyDir + set workingDir there so V8's auto
# snapshot (via --heapsnapshot-near-heap-limit / SIGUSR2) lands on a
# volume that survives container restart, and the StatusServer's
# /debug/heap-snapshot endpoint writes there too. The orchestrator's
# RSS watchdog triggers /debug/heap-snapshot at ~75% and ~90% of the
# memory limit above (≈ 384 MB / 461 MB at 512Mi); the SNAPSHOT phase
# `kubectl cp`s the directory into `<artifactDir>/heapdumps/<pod>/`.
heapdumps:
  enabled: true
  sizeLimit: 2Gi
