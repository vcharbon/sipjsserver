# Endurance-only overlay layered on top of
# `tests/k8s/values/b2bua-worker.yaml`.
#
# `run-endurance.ts` applies both files when installing the
# b2bua-worker chart. The base file stays neutral so the memleak
# harness (`sippperftest/memleak-test-k8s.sh`, which has its own
# overlay `sippperftest/values-memleak-worker.yaml`) is not affected.
#
# Why this overlay exists: run
# `endurance-2026-05-09t20-26-22-853z` showed workers freezing
# ~15 min after pod start with no diagnostic data captured. The heap
# was 1.2 GB with `concurrent=0` calls, and the only signal was a
# proxy probe-miss → declared dead. Without the flags below the next
# endurance run reproduces the same opaque collapse.
#
# The memleak overlay deliberately fully replaces `extraEnv` (chart
# helpers do shallow array merge — we don't fight that). This file
# follows the same convention: it appends to extraEnv by repeating
# the upstream entries plus the diagnostic NODE_OPTIONS.

extraEnv:
  - name: REDIS_URL
    value: "redis://localhost:6379"
  - name: LIMITER_REDIS_URL
    value: "redis://redis:6379"
  - name: SIP_LOCAL_IP
    value: "$(POD_IP)"
  - name: CALL_CONTROL_URL
    value: "http://call-control:8080"
  - name: B2B_OUTBOUND_PROXY
    value: "172.20.255.250:5060"
  # A/B between the JS dgram + custom TS parser stack and the native
  # (Rust UDP socket + rvoip strict parse inline) stack within the same
  # endurance run. Temporarily pinned to `js,js` (2026-05-22) to isolate
  # the OOM regression observed since commit 140d7886 "arr native
  # parser": runs predating that commit had 0 worker OOMs, runs after
  # had 5+ per 30 min. Comparing a JS-only endurance against the
  # native-mixed runs at the same revision pins whether the off-heap
  # growth is in the JS pipeline or the rvoip/Rust path. Restore to
  # `js,native` after the JS-only baseline is captured.
  - name: SIP_UDP_STACK_BY_ORDINAL
    value: "js,js"
  # ADR-0010 — enable msgpackr records-mode with hardcoded shared
  # structures. ~71 % smaller bodies at near-identical encode CPU per
  # microbench; main wins are downstream (Redis I/O, replication
  # bandwidth, GC pressure from buffer alloc). All workers in the
  # endurance cluster must agree on the codec; the test harness
  # always brings up a fresh cluster, so this is safe.
  - name: B2BUA_CODEC
    value: "MSGPACK_RECORDS"
  # Endurance leak diagnostics:
  # - `--heapsnapshot-signal=SIGUSR2` lets `kill -USR2 1` (or the
  #   orchestrator) trigger a v8 heap snapshot to the worker's CWD.
  #   `/debug/heap-snapshot` HTTP endpoint already works without this
  #   flag; the signal route is the fallback when the event loop is
  #   stuck and HTTP routing is unresponsive.
  # - `--max-old-space-size=400` keeps V8's old space below the
  #   container `resources.limits.memory` cap (512Mi). When the leak
  #   crosses 400Mi the JS layer triggers a heap-OOM with a stack
  #   trace, before the kernel OOMKill removes the pod silently.
  # - `--heapsnapshot-near-heap-limit=2` auto-dumps two heap snapshots
  #   the first two times the heap approaches the V8 limit, so even
  #   an unattended run captures the leaking heap before crash. Files
  #   land in the container's CWD — with `heapdumps.enabled` below,
  #   that's `/heapdumps` (an emptyDir that survives container
  #   restart) instead of `/app` (writable layer, lost on OOM-kill).
  # - `--cpu-prof --cpu-prof-dir=/heapdumps --cpu-prof-interval=5000`
  #   samples the V8 CPU profile at 5 ms intervals over the full run
  #   and writes `CPU.<date>.<pid>.<tid>.<seq>.cpuprofile` to the same
  #   /heapdumps volume the SNAPSHOT phase already collects. The
  #   profile is flushed when the process exits cleanly (DRAIN-phase
  #   SIGTERM). 5 ms keeps the file at a manageable size for a 30 min
  #   run (≈ 360 k samples) while still resolving hot stacks; raise to
  #   1000 (1 ms) for short profiling runs that need finer resolution.
  #   Overhead at 5 ms is ≤ 1 % per V8 docs. Do NOT enable in production.
  # `--max-old-space-size=800` (was 400). Raised because the always-on
  # `--cpu-prof` path (now removed) had pushed the previous 400 MB cap +
  # 1Gi container into a 5-min OOMKill cycle. The looser headroom is
  # kept even after dropping cpu-prof so we have a stable comparison
  # baseline for the on-demand profile path (see below) and to leave
  # room for `--heapsnapshot-near-heap-limit` to actually flush a
  # complete snapshot before the cgroup OOM-killer fires.
  #
  # CPU profiling is now triggered on-demand via `POST /debug/cpu-profile?seconds=N`
  # which uses the inspector module programmatically for a bounded
  # window. The always-on `--cpu-prof` flag was inflating reported ELU
  # (workers showed 60-70 % ELU at idle, tripping AIMD cap → 503 sanity
  # failures) and adding ~200 MB of off-heap sample buffer.
  - name: NODE_OPTIONS
    value: "--heapsnapshot-signal=SIGUSR2 --max-old-space-size=800 --heapsnapshot-near-heap-limit=2"
  # glibc malloc retention tuning. Default arena count is 8 × nproc on
  # multi-core nodes (kind workers have 4-16 cores → 32-128 arenas).
  # Each arena keeps its own free-list and never releases to the OS
  # except via the slow `M_TRIM_THRESHOLD` path. Under abuse traffic
  # the high-water-mark allocation rate grows every arena, and the
  # ~1 GB "non-JS gap" between V8 heap + external and RSS we observed
  # in `gauges-verify-20caps-1abuse-30m-2026-05-24t11-21` is almost
  # entirely this retention. `MALLOC_ARENA_MAX=2` clamps glibc to 2
  # arenas — well-known Node-server tuning that significantly reduces
  # RSS plateau at the cost of a tiny lock-contention increase (we
  # have ~10 concurrent allocation sources, far below the contention
  # threshold). The b2bua_v8_heap_stats_bytes{kind="peak_malloced_memory"}
  # gauge vs b2bua_process_memory_bytes{kind="rss"} delta confirms the win.
  - name: MALLOC_ARENA_MAX
    value: "2"
  # ADR 0012 — sizing assertions, made explicit at launch time. Each
  # assertion is observable via /metrics; the Memory Sizing dashboard
  # plots the gauge alongside its target. Drift trips the dashboard,
  # not a production incident.
  #
  #   - MAX_MESSAGES_PER_CALL=100 caps flushCache body growth per call.
  #     Combined with the steady-state target of ≤ 1000 concurrent
  #     calls → flushCache stays under ~100 MB.
  #     Observed via: b2bua_flush_cache_bytes,
  #                   b2bua_active_dialogs,
  #                   b2bua_encode_bytes_total / b2bua_encode_count_total.
  #
  #   - Tier-3 admission (ADR 0007) caps CPS at ≤ 50/s/worker.
  #     Observed via: rate(b2bua_overload_admit_total).
  #
  #   - Tier-1 UDP brake bounds inbound message rate; the bounded
  #     event queue is the second-stage backstop.
  #     Observed via: rate(b2bua_messages_total{direction="inbound"}),
  #                   b2bua_worker_event_queue_drops_total.
  #
  #   - Avg inbound SIP message size assumed ≤ 2 KB.
  #     Observed via: rate(b2bua_messages_bytes_total{direction="inbound"})
  #                 / rate(b2bua_messages_total{direction="inbound"}).
  #
  #   - Replication write rate per worker assumed ≤ 500/s.
  #     Observed via: rate(b2bua_replication_writes_total).
  - name: MAX_MESSAGES_PER_CALL
    value: "100"

# Cap worker app container memory so unreclaimable heap growth
# becomes a deterministic OOMKilled at 2Gi instead of slow CPU
# saturation at 1.2 GB+ (the post-run idle state observed in
# endurance-2026-05-09t20-26-22-853z). The production helm values
# leave `resources: {}` — this cap is test-environment only.
#
# 2Gi vs --max-old-space-size=800: leaves ~1.2 GiB headroom above
# V8's old-space cap. Sized to accommodate the --cpu-prof sample
# buffer (~100-300 MB over 30 min at 5 ms intervals) on top of V8
# heap + native UDP/replication buffers, while still giving
# v8.writeHeapSnapshot room to flush a complete snapshot before the
# cgroup OOM-killer fires. Previous 1Gi cap was tight enough that
# adding --cpu-prof tipped workers into a 5-min OOMKill cycle (round-3
# endurance had 7+8 restarts in 30 min).
resources:
  limits:
    memory: 2Gi
  requests:
    cpu: 25m
    memory: 100Mi

# Mount /heapdumps emptyDir + set workingDir there so V8's auto
# snapshot (via --heapsnapshot-near-heap-limit / SIGUSR2) lands on a
# volume that survives container restart, and the StatusServer's
# /debug/heap-snapshot endpoint writes there too. The orchestrator's
# RSS watchdog triggers /debug/heap-snapshot at ~75% and ~90% of the
# memory limit above (≈ 384 MB / 461 MB at 512Mi); the SNAPSHOT phase
# `kubectl cp`s the directory into `<artifactDir>/heapdumps/<pod>/`.
heapdumps:
  enabled: true
  sizeLimit: 2Gi
