# Test-only overrides for the b2bua-worker production chart.
# Production chart: deploy/helm/b2bua-worker/

# Match what we built + loaded into kind via tests/k8s/scripts/images.ts.
image:
  repository: sipjsserver
  tag: dev
  pullPolicy: IfNotPresent

# Pin to the b2bua-worker name regardless of release name so the proxy's
# worker.statefulSetName resolves predictably.
fullnameOverride: b2bua-worker

replicaCount: 2

# Pin worker pods to the app tier nodes.
nodeSelector:
  tier: app

# Prefer one worker pod per app node, but don't HARD-block scaling
# beyond #nodes. Production charts can use `required` for true HA;
# test env uses `preferred` so INV-4 can scale 2 → 3 replicas without
# adding a third app node.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: b2bua-worker
          topologyKey: kubernetes.io/hostname

# Test-environment override: faster drain so INV-3 (drain preserves
# in-flight calls) completes in ~30s instead of the production 200s.
# Production stays at 200s for RFC 3261 Timer C math (180s + 20s safety).
terminationGracePeriodSeconds: 30

# Per-pod Redis sidecar topology. Each worker pod ships its own
# Redis container at `localhost:6379`; peer workers fetch state via
# `/replog` over the headless StatefulSet DNS. See
# docs/replication/call-cache-backup.md §2-§4 for the full design.
redis:
  enabled: true

extraEnv:
  # Sidecar Redis (call context only) — RedisClient. Sub-millisecond
  # writes on the SIP hot path (no cross-pod hop).
  - name: REDIS_URL
    value: "redis://localhost:6379"
  # Cluster-shared Redis (call limiter only) — LimiterRedisClient.
  # Installed via tests/k8s/charts/redis/. Concurrent-call counters
  # are global across the fleet; without this every worker would
  # increment its own local sidecar counter and limits would not be
  # enforced cluster-wide.
  - name: LIMITER_REDIS_URL
    value: "redis://redis:6379"
  # Worker uses sipLocalIp for both bind AND Contact/Via header
  # construction. Bind to (and advertise) the pod IP so responses are
  # routable. POD_IP is set by the chart from the downward API; K8s
  # resolves $(POD_IP) against earlier env vars.
  - name: SIP_LOCAL_IP
    value: "$(POD_IP)"
  # Mock backend installed by tests/k8s/charts/sipp/ (call-control:8080).
  - name: CALL_CONTROL_URL
    value: "http://call-control:8080"
  # B-leg outbound proxy. With this set, helpers.ts preloads
  # `Route: <sip:sip-front-proxy:5060;lr;outbound>` on the b-leg INVITE
  # so the proxy Record-Routes the b-leg; the response carries
  # Record-Route; confirm-dialog populates the b-leg routeSet; and
  # subsequent in-dialog requests (keepalive OPTIONS, relay re-INVITE,
  # INFO, BYE) flow back through the proxy. Without this, the b-leg
  # routeSet stays empty and the 15-min keepaliveRule tears down every
  # long-hold call. See docs/plan/structured-imagining-dewdrop.md.
  - name: B2B_OUTBOUND_PROXY
    # Must be reachable by the worker AND actually answered by a
    # listener. With sip-front-proxy.vip.enabled, the proxy binds the
    # VIP only — the Service DNS (sip-front-proxy:5060) DNATs to
    # pod/node IPs where nothing is listening. Point at the VIP
    # directly. See docs/lb-proxy-ha.md.
    value: "172.20.255.250:5060"
