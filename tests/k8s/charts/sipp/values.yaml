sipp:
  image: sipp:dev
  imagePullPolicy: IfNotPresent

# Mock call-control backend that always routes to sipp-uas:5060.
# Reuses the sipjsserver:dev image (Node 22) and runs an inline JS
# mounted from a ConfigMap.
callControl:
  image: sipjsserver:dev
  imagePullPolicy: IfNotPresent
  port: 8080
  # Where the worker should route every call. The UAS Service inside
  # this chart resolves to sipp-uas:5060 inside the namespace.
  target:
    host: sipp-uas
    port: 5060

# Pin SIPp UAS and mock call-control to the load tier so they don't
# share nodes with the proxy/worker pods.
nodeSelector:
  tier: load
