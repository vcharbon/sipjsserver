apiVersion: v1
kind: ConfigMap
metadata:
  name: call-control-script
  labels:
    app.kubernetes.io/name: call-control
data:
  server.mjs: |
    import http from "node:http"

    // X-Api-Call-aware mock: when sip_headers carries an X-Api-Call JSON
    // instruction, honor it (action route|reject, destination, on_failure,
    // call_limiter, update_headers). Otherwise fall back to the legacy
    // TARGET_HOST/TARGET_PORT default route. Mirrors the canonical
    // src/decision/adapters/http-reference/MockServer.ts semantics so the
    // hybrid register-fakeExt-realCore harness can drive routing from
    // alice's INVITE.
    const TARGET_HOST = process.env.TARGET_HOST || "sipp-uas"
    const TARGET_PORT = parseInt(process.env.TARGET_PORT || "5060", 10)
    // Abuse-traffic destination overrides. When the inbound call-id
    // starts with ABUSE_CID_PREFIX, the b-leg routes to the abuse
    // pool instead of the standard UAS — keeps protocol-abuse
    // traffic from polluting the standard sipp-uas's success-rate.
    const ABUSE_TARGET_HOST = process.env.ABUSE_TARGET_HOST || TARGET_HOST
    const ABUSE_TARGET_PORT = parseInt(
      process.env.ABUSE_TARGET_PORT || String(TARGET_PORT),
      10,
    )
    const ABUSE_CID_PREFIX = process.env.ABUSE_CID_PREFIX || "abuse-"
    const PORT = parseInt(process.env.PORT || "8080", 10)

    function pickTargetFor(body) {
      const cid = (body && body.call_id) || ""
      if (typeof cid === "string" && cid.startsWith(ABUSE_CID_PREFIX)) {
        return { host: ABUSE_TARGET_HOST, port: ABUSE_TARGET_PORT }
      }
      return { host: TARGET_HOST, port: TARGET_PORT }
    }

    function readBody(req) {
      return new Promise((resolve, reject) => {
        const chunks = []
        req.on("data", (c) => chunks.push(c))
        req.on("end", () => resolve(Buffer.concat(chunks).toString("utf8")))
        req.on("error", reject)
      })
    }

    function reply(res, status, body) {
      res.statusCode = status
      res.setHeader("content-type", "application/json")
      res.end(JSON.stringify(body))
    }

    function buildRouteFromInstruction(body, instr) {
      const userMatch = /^sip:([^@]+)@/.exec(body.ruri || "")
      const user = userMatch ? userMatch[1] : ""
      if (instr.action === "reject") {
        return {
          action: "reject",
          reject_code: instr.reject_code || 403,
          reject_reason: instr.reject_reason || "Rejected",
        }
      }
      const dest = instr.destination || {}
      const fallback = pickTargetFor(body)
      const host = dest.host || fallback.host
      const port = dest.port || fallback.port
      const resp = {
        action: "route",
        destination: { host, port, transport: "udp" },
        new_ruri: instr.new_ruri || `sip:${user}@${host}:${port}`,
      }
      if (instr.update_headers) resp.update_headers = instr.update_headers
      if (instr.call_limiter) resp.call_limiter = instr.call_limiter
      if (instr.on_failure !== undefined) {
        resp.callback_context = JSON.stringify(instr.on_failure)
      }
      if (instr.relay_first_18x_to_180) resp.relay_first_18x_to_180 = true
      return resp
    }

    function handleNewCall(body) {
      const apiCallRaw = body.sip_headers && body.sip_headers["X-Api-Call"]
      if (apiCallRaw !== undefined && apiCallRaw !== null) {
        let instr
        try {
          instr = JSON.parse(apiCallRaw)
        } catch {
          return { error: "Invalid X-Api-Call JSON" }
        }
        return buildRouteFromInstruction(body, instr)
      }
      // Legacy fallback for tests that don't send X-Api-Call.
      const t = pickTargetFor(body)
      return {
        action: "route",
        destination: { host: t.host, port: t.port, transport: "udp" },
        new_ruri: `sip:test@${t.host}:${t.port}`,
      }
    }

    function handleCallFailure(body) {
      if (body.callback_context !== undefined) {
        try {
          const instr = JSON.parse(body.callback_context)
          if (instr.action === "failover") {
            if (!instr.destination) return { action: "terminate" }
            const resp = { action: "failover", destination: instr.destination }
            if (instr.new_ruri) resp.new_ruri = instr.new_ruri
            if (instr.call_limiter) resp.call_limiter = instr.call_limiter
            if (instr.update_headers) resp.update_headers = instr.update_headers
            resp.callback_context =
              instr.on_next_failure !== undefined
                ? JSON.stringify(instr.on_next_failure)
                : body.callback_context
            if (instr.relay_first_18x_to_180) resp.relay_first_18x_to_180 = true
            return resp
          }
        } catch {
          /* fall through to terminate */
        }
      }
      return { action: "terminate" }
    }

    const server = http.createServer(async (req, res) => {
      try {
        const raw = await readBody(req)
        if (req.url === "/healthz") return reply(res, 200, { ok: true })
        const body = raw.length > 0 ? JSON.parse(raw) : {}
        if (req.url === "/call/new" && req.method === "POST") {
          const resp = handleNewCall(body)
          if (resp.error) return reply(res, 400, resp)
          return reply(res, 200, resp)
        }
        if (req.url === "/call/failure" && req.method === "POST") {
          return reply(res, 200, handleCallFailure(body))
        }
        if (req.url === "/call/refer" && req.method === "POST") {
          return reply(res, 200, { action: "reject", reject_code: 603, reject_reason: "Declined" })
        }
        reply(res, 404, { error: "not found" })
      } catch (err) {
        reply(res, 500, { error: String(err) })
      }
    })
    server.listen(PORT, "0.0.0.0", () => {
      console.log(`mock call-control listening on :${PORT}, default-target=${TARGET_HOST}:${TARGET_PORT}, abuse-target=${ABUSE_TARGET_HOST}:${ABUSE_TARGET_PORT} (cid prefix='${ABUSE_CID_PREFIX}')`)
    })
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: call-control
  labels:
    app.kubernetes.io/name: call-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: call-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: call-control
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: call-control
          image: {{ .Values.callControl.image | quote }}
          imagePullPolicy: {{ .Values.callControl.imagePullPolicy }}
          command: ["node", "/script/server.mjs"]
          env:
            - name: PORT
              value: {{ .Values.callControl.port | quote }}
            - name: TARGET_HOST
              value: {{ .Values.callControl.target.host | quote }}
            - name: TARGET_PORT
              value: {{ .Values.callControl.target.port | quote }}
            - name: ABUSE_TARGET_HOST
              value: {{ .Values.callControl.abuseTarget.host | quote }}
            - name: ABUSE_TARGET_PORT
              value: {{ .Values.callControl.abuseTarget.port | quote }}
            - name: ABUSE_CID_PREFIX
              value: {{ .Values.callControl.abuseCidPrefix | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.callControl.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
          volumeMounts:
            - name: script
              mountPath: /script
      volumes:
        - name: script
          configMap:
            name: call-control-script
---
apiVersion: v1
kind: Service
metadata:
  name: call-control
  labels:
    app.kubernetes.io/name: call-control
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: call-control
  ports:
    - name: http
      port: {{ .Values.callControl.port }}
      targetPort: http
      protocol: TCP
